# Apache common configuration for IEM Web Farm
# Variables available for apache configuration file usage (not ENV vars)
# IEMWEBFARM_MAPSERV -- path to the mapserv binary
# IEMWEBFARM_LOGROOT -- path to log directory

<IfDefine !IEMWEBFARM_MAPSERV>
    Define IEMWEBFARM_MAPSERV /opt/miniconda3/envs/prod/bin/mapserv
</IfDefine>

<IfDefine !IEMWEBFARM_LOGROOT>
    Define IEMWEBFARM_LOGROOT /mesonet/www/logs
</IfDefine>

# For logging, mod_remoteip is doing the heavy lifting.
# Note, that if the X-Forwarded-For has multiple addresses, mod_remoteip
# is only stripping off the last value, so its presence is not a check
# for if the connection was proxied.


# 1. IEMWebfarm lives behind a F5 proxy
# 2. We have an application firewall that we want to efficiently block hosts
# 3. By using mod_remoteip, we can shift the XFF header into REMOTE_ADDR
# 4. Note, we would never want to trust this for IP-based Auth
<IfModule mod_remoteip.c>
    RemoteIPHeader X-Forwarded-For
    # IPv6 arrives in range 2610:130:108:9::a59:300 to 2610:130:108:9::a59:30a
    # IPv4 arrives in 10.89.3.0/32
    # ATTM, these IPs are not placed into the XFF header
    # This controls from which hosts the XFF header is trusted.
    RemoteIPInternalProxy 2610:130:108:9::a59:300/124
    RemoteIPInternalProxy 10.89.3.0/24
    RemoteIPInternalProxy 127.0.0.1

</IfModule>

# Attempting to "fix" a frustrating error of
# AH01102: error reading status line from remote server
# Docs suggest as much, but a small perf penalty
# https://httpd.apache.org/docs/current/mod/mod_proxy_http.html
SetEnv proxy-initial-not-pooled 1
SetEnv proxy-nokeepalive 1
